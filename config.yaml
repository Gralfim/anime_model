# ── Collaborative Filtering (--cf) ────────────────────────────────
cf:
  # Výběr seed uživatelů přes niche tituly
  seed_min_score:      8      # min. tvoje skóre pro seed titul
  seed_max_popularity: 50000  # max. MAL members — filtr "niche" titulů
                              # zvyš pokud nemáš dost seed titulů
  seed_titles_count:   20     # kolik niche titulů použít
  users_per_seed:      15     # kolik uživatelů na seed titul

  # Filtrování podobných uživatelů
  min_overlap:         50     # min. společných titulů pro výpočet korelace
  min_correlation:     0.15   # min. Pearsonova korelace (snižovat opatrně)
  top_k_users:         50     # počet nejpodobnějších uživatelů

  # Predikce
  min_cf_users:        3      # min. podobných uživatelů kteří titul hodnotili
  show_top:            25     # počet výsledků
  min_mal_score:       6.5    # min. MAL skóre kandidáta
  request_delay:       0.5    # sekundy mezi Jikan requesty (nesnižovat)

# ── Cluster analýza (--cluster) ────────────────────────────────
cluster:
  # Počet clusterů (přepíše --k z příkazové řádky)
  k: 6
  # Počet doporučení na cluster
  top_per_cluster: 8

# ── Predikce ───────────────────────────────────────────────────
prediction:
  mode: "ptw"            # ptw | ids | top_mal
  custom_ids: []
  top_mal_count: 100
  min_mal_score: 7.0
  show_top: 20

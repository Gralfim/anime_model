    - "Magic"  # 73 titulů (18%)
    - "Urban"  # 67 titulů (17%)
    - "Seinen"  # 61 titulů (15%)
    - "CGI"  # 61 titulů (15%)
    - "Crossdressing"  # 54 titulů (14%)
    - "Primarily Adult Cast"  # 54 titulů (14%)
    - "Maids"  # 52 titulů (13%)
    - "Episodic"  # 51 titulů (13%)
    - "Swordplay"  # 48 titulů (12%)
    - "Meta"  # 47 titulů (12%)
    - "Medieval"  # 44 titulů (11%)

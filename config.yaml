    - "Teacher"  # 26 titulů (6%)

  # Animační studia jako binární příznaky
  studios:
    - "Kyoto Animation"
    - "Shaft"
    - "P.A. Works"
    - "A-1 Pictures"
    - "J.C. Staff"
    - "Brain's Base"
    - "Doga Kobo"
    - "feel."
    - "Wit Studio"
    - "CloverWorks"
    - "MAPPA"
    - "Madhouse"

# ── Cluster analýza (--cluster) ────────────────────────────────
cluster:
  # Počet clusterů (přepíše --k z příkazové řádky)
  k: 6
  # Počet doporučení na cluster
  top_per_cluster: 8

# ── Predikce ───────────────────────────────────────────────────
prediction:
  mode: "ptw"            # ptw | ids | top_mal
  custom_ids: []
  top_mal_count: 100
  min_mal_score: 7.0
  show_top: 20
